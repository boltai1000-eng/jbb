services:
  - type: web
    name: jbb-dashboard
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile=false && pnpm --filter @jbb/client build && pnpm --filter @jbb/server build
    startCommand: pnpm --filter @jbb/server start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: jbb-dashboard-db
          property: connectionString

databases:
  - name: jbb-dashboard-db
    plan: basic-256mb
